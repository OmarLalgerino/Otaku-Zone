<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - عالم الأنمي العربي</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0a10'/%3E%3Ctext x='50' y='40' font-family='Arial Black' font-size='28' font-weight='900' fill='%23e63946' text-anchor='middle' dominant-baseline='middle'%3EOZ%3C/text%3E%3Ctext x='50' y='72' font-family='Arial' font-size='12' fill='%23888' text-anchor='middle'%3Eアニメ%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-primary: #050508;
            --bg-secondary: #0c0c12;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a25;
            --bg-modal: #0a0a10;
            --accent: #e63946;
            --accent-glow: #ff1a2e;
            --accent-dark: #b91c28;
            --gold: #ffd700;
            --gold-dim: #c4a000;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --border: #1e1e2e;
            --border-accent: #2a2a3e;
            --telegram: #0088cc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Noto Kufi Arabic', sans-serif;
            direction: rtl;
            overflow-x: hidden;
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

        /* ===== ANIMATIONS ===== */
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(230, 57, 70, 0.1); } 50% { box-shadow: 0 0 40px rgba(230, 57, 70, 0.25); } }
        @keyframes loadingBar { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        @keyframes spin { to { transform: rotate(360deg); } }

        .shimmer-bg {
            background: linear-gradient(90deg, transparent 0%, rgba(230,57,70,0.06) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 2.5s infinite;
        }

        .text-gradient {
            background: linear-gradient(135deg, #e63946, #ff6b6b, #e63946);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gold-gradient {
            background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ===== LOADING SCREEN ===== */
        #loading-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg-primary);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        #loading-screen.hidden { opacity: 0; pointer-events: none; }
        #loading-screen .logo-wrap { position: relative; animation: scaleIn 0.6s ease-out; }
        #loading-screen .logo-glow { position: absolute; inset: -32px; background: rgba(230,57,70,0.1); border-radius: 50%; filter: blur(30px); animation: pulse-glow 2s infinite; }
        #loading-screen .logo-text { position: relative; font-family: 'Outfit', sans-serif; font-size: 48px; font-weight: 900; letter-spacing: 4px; }
        #loading-screen .loading-bar-track { margin-top: 32px; width: 192px; height: 4px; background: var(--bg-card); border-radius: 4px; overflow: hidden; }
        #loading-screen .loading-bar-fill { height: 100%; width: 50%; background: linear-gradient(90deg, transparent, var(--accent), transparent); border-radius: 4px; animation: loadingBar 1s ease-in-out infinite; }
        #loading-screen .loading-text { margin-top: 16px; color: var(--text-muted); font-size: 14px; animation: fadeIn 0.5s ease 0.7s both; }

        /* ===== NAVBAR ===== */
        #navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            transition: all 0.4s ease; background: transparent;
        }
        #navbar.scrolled {
            background: rgba(5,5,8,0.92); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .nav-inner {
            max-width: 1280px; margin: 0 auto; padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
            height: 72px;
        }
        .nav-logo { display: flex; align-items: center; gap: 12px; cursor: pointer; transition: transform 0.2s; }
        .nav-logo:hover { transform: scale(1.03); }
        .nav-logo-icon {
            width: 44px; height: 44px; background: var(--accent);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 18px; color: white;
        }
        .nav-logo-text h1 { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 2px; }
        .nav-logo-text p { font-size: 10px; color: var(--text-muted); letter-spacing: 3px; margin-top: 2px; }
        .nav-search { flex: 1; max-width: 420px; margin: 0 32px; position: relative; }
        .nav-search input {
            width: 100%; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 14px; padding: 10px 42px 10px 16px;
            color: var(--text-primary); font-family: inherit; font-size: 14px;
            outline: none; transition: border-color 0.3s;
        }
        .nav-search .search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
        .nav-actions { display: flex; align-items: center; gap: 12px; }
        .telegram-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 18px; background: rgba(0,136,204,0.1);
            border: 1px solid rgba(0,136,204,0.3); border-radius: 14px;
            color: var(--telegram); font-size: 14px; font-weight: 500;
            text-decoration: none; transition: all 0.3s;
        }
        .mobile-search-btn { display: none; padding: 8px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; color: var(--text-secondary); cursor: pointer; }

        @media (max-width: 768px) {
            .nav-search { display: none; }
            .nav-logo-text { display: none; }
            .telegram-btn span { display: none; }
            .mobile-search-btn { display: flex; }
            .nav-inner { height: 60px; padding: 0 16px; }
        }

        #mobile-search-bar { display: none; padding: 0 16px 16px; }
        #mobile-search-bar.show { display: block; }
        #mobile-search-bar input {
            width: 100%; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 14px; padding: 12px 16px; color: var(--text-primary); outline: none;
        }

        /* ===== HERO SECTION ===== */
        #hero { position: relative; min-height: 90vh; display: flex; align-items: center; overflow: hidden; padding-top: 80px; }
        .hero-bg { position: absolute; inset: 0; }
        .hero-bg .overlay-1 { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg-primary), rgba(5,5,8,0.8), rgba(5,5,8,0.4)); }
        .hero-bg .overlay-2 { position: absolute; inset: 0; background: linear-gradient(to right, var(--bg-primary), transparent, var(--bg-primary)); }
        .hero-content { position: relative; z-index: 10; max-width: 1280px; margin: 0 auto; padding: 0 24px; width: 100%; }
        .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; }
        .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; background: rgba(230,57,70,0.1); border: 1px solid rgba(230,57,70,0.2); border-radius: 50px; margin-bottom: 24px; font-size: 12px; color: var(--accent); }
        .hero-title { font-size: clamp(32px, 6vw, 72px); font-weight: 900; line-height: 1.15; margin-bottom: 24px; animation: fadeInUp 0.8s ease 0.3s both; }
        .hero-desc { color: var(--text-secondary); font-size: 16px; line-height: 1.8; max-width: 520px; margin-bottom: 32px; animation: fadeInUp 0.8s ease 0.5s both; }
        .hero-buttons { display: flex; flex-wrap: wrap; gap: 16px; animation: fadeInUp 0.8s ease 0.7s both; }
        .btn-primary { padding: 14px 32px; background: var(--accent); border: none; border-radius: 16px; color: white; font-weight: 700; cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 24px rgba(230,57,70,0.25); }
        .btn-secondary { padding: 14px 32px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; color: var(--text-secondary); text-decoration: none; transition: all 0.3s; }
        .hero-stats { display: flex; gap: 40px; margin-top: 40px; padding-top: 32px; border-top: 1px solid rgba(30,30,46,0.5); animation: fadeInUp 0.8s ease 1s both; }
        .hero-stat-value { font-size: 24px; font-weight: 900; }
        .hero-stat-label { font-size: 12px; color: var(--text-muted); }

        .hero-featured { animation: slideInRight 0.8s ease 0.5s both; }
        .hero-featured-inner { position: relative; animation: float 6s ease-in-out infinite; }
        .hero-featured-card { position: relative; background: rgba(18,18,26,0.8); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .hero-featured-card img { width: 100%; height: 450px; object-fit: cover; }
        .hero-featured-info { position: absolute; bottom: 0; right: 0; left: 0; padding: 24px; background: linear-gradient(to top, var(--bg-card), transparent); }

        @media (max-width: 1024px) {
            .hero-grid { grid-template-columns: 1fr; text-align: center; }
            .hero-featured { display: none; }
            .hero-desc { margin: 0 auto 32px; }
            .hero-buttons { justify-content: center; }
            .hero-stats { justify-content: center; }
            #hero { min-height: 80vh; }
        }

        /* ===== ANIME GRID ===== */
        #anime-section { padding: 48px 24px 64px; }
        .section-inner { max-width: 1280px; margin: 0 auto; }
        .section-header { display: flex; align-items: center; gap: 16px; margin-bottom: 36px; }
        .section-bar { width: 6px; height: 40px; background: var(--accent); border-radius: 6px; }
        .section-title { font-size: 28px; font-weight: 900; }

        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 20px; }
        @media (max-width: 640px) { .anime-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }

        .anime-card { cursor: pointer; transition: transform 0.3s ease; }
        .anime-card:hover { transform: translateY(-8px); }
        .anime-card-inner { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .anime-card-img { position: relative; aspect-ratio: 3/4; overflow: hidden; }
        .anime-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .score-badge { position: absolute; top: 12px; right: 12px; padding: 4px 10px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border-radius: 8px; color: var(--gold); font-size: 12px; font-weight: 700; }
        .ep-badge { position: absolute; top: 12px; left: 12px; padding: 4px 10px; background: rgba(230,57,70,0.8); border-radius: 8px; color: white; font-size: 12px; font-weight: 700; }
        .anime-card-info { padding: 14px; }
        .anime-card-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .genre-tag { font-size: 10px; padding: 2px 8px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 50px; color: var(--text-muted); }

        /* ===== MODAL (Responsive Fixes) ===== */
        #anime-modal { position: fixed; inset: 0; z-index: 200; display: none; align-items: flex-start; justify-content: center; overflow-y: auto; background: rgba(0,0,0,0.95); backdrop-filter: blur(4px); }
        #anime-modal.open { display: flex; }
        .modal-card { position: relative; width: 100%; max-width: 1100px; margin: 24px 16px 40px; background: var(--bg-modal); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; }
        .modal-close { position: absolute; top: 16px; left: 16px; z-index: 20; padding: 8px; background: rgba(18,18,26,0.8); border-radius: 12px; cursor: pointer; color: white; border: 1px solid var(--border); }
        
        .modal-player-wrap { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; }
        .modal-player-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

        .modal-body { padding: 24px; }
        .modal-layout { display: flex; flex-direction: column; gap: 24px; }
        @media (min-width: 768px) { .modal-layout { flex-direction: row; gap: 32px; } }

        .modal-poster { width: 100%; }
        @media (min-width: 768px) { .modal-poster { width: 256px; flex-shrink: 0; } }
        .modal-poster-img img { width: 100%; border-radius: 16px; border: 1px solid var(--border); }

        .season-select-wrap select { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; outline: none; margin-top: 8px; }
        
        .modal-tabs { display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; }
        .modal-tabs::-webkit-scrollbar { height: 2px; }
        .modal-tab-btn { padding: 10px 16px; border-radius: 12px; font-size: 13px; white-space: nowrap; background: var(--bg-card); color: var(--text-muted); border: none; cursor: pointer; }
        .modal-tab-btn.active { background: var(--accent); color: white; }

        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; }
        .episode-btn { padding: 12px; border-radius: 12px; background: var(--bg-card); border: 1px solid var(--border); color: white; cursor: pointer; font-weight: 700; }
        .episode-btn.active { background: var(--accent); border-color: var(--accent); }

        .people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .person-card { display: flex; align-items: center; gap: 10px; background: var(--bg-card); padding: 10px; border-radius: 12px; }
        .person-card img { width: 45px; height: 60px; object-fit: cover; border-radius: 8px; }

        /* Studio Overlay */
        #studio-overlay { position: fixed; inset: 0; z-index: 300; display: none; background: rgba(0,0,0,0.98); overflow-y: auto; padding: 20px; }
        #studio-overlay.open { display: flex; justify-content: center; }
        .studio-card { width: 100%; max-width: 900px; background: var(--bg-modal); border-radius: 24px; padding: 24px; position: relative; }
        .studio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; margin-top: 20px; }
        .studio-anime-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; }

        /* FOOTER */
        #footer { padding: 48px 24px; border-top: 1px solid var(--border); margin-top: 64px; }
        .footer-grid { display: grid; grid-template-columns: 1fr; gap: 32px; text-align: center; }
        @media (min-width: 768px) { .footer-grid { grid-template-columns: 1fr 1fr 1fr; text-align: right; } }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="logo-wrap">
        <div class="logo-glow"></div>
        <div class="logo-text"><span class="text-gradient">OTAKU</span><span style="color:white"> ZONE</span></div>
    </div>
    <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
    <p class="loading-text">جاري التحميل...</p>
</div>

<nav id="navbar">
    <div class="nav-inner">
        <div class="nav-logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">
            <div class="nav-logo-icon">OZ</div>
            <div class="nav-logo-text"><h1><span class="text-gradient">OTAKU</span> ZONE</h1><p>عالم الأنمي العربي</p></div>
        </div>
        <div class="nav-search">
            <input type="text" id="desktop-search" placeholder="ابحث عن أنمي..." oninput="filterAnime(this.value)">
        </div>
        <div class="nav-actions">
            <button class="mobile-search-btn" onclick="toggleMobileSearch()">🔍</button>
            <a href="https://t.me/OtakuZoen" target="_blank" class="telegram-btn">✈️ <span>تيليجرام</span></a>
        </div>
    </div>
    <div id="mobile-search-bar"><input type="text" id="mobile-search" placeholder="ابحث عن أنمي..." oninput="filterAnime(this.value)"></div>
</nav>

<section id="hero">
    <div class="hero-bg"><div class="overlay-1"></div><div class="overlay-2"></div></div>
    <div class="hero-content">
        <div class="hero-grid">
            <div>
                <div class="hero-badge">✨ أفضل تجربة مشاهدة</div>
                <h1 class="hero-title"><span class="text-gradient">عالم الأنمي</span><br>بين يديك</h1>
                <p class="hero-desc">شاهد أحدث مسلسلات الأنمي مترجمة بجودة عالية. قصص مذهلة وعوالم خيالية تنتظرك.</p>
                <div class="hero-buttons">
                    <button class="btn-primary" onclick="document.getElementById('anime-section').scrollIntoView({behavior:'smooth'})">▶ ابدأ المشاهدة</button>
                    <a href="https://t.me/OtakuZoen" target="_blank" class="btn-secondary">انضم للمجتمع</a>
                </div>
                <div class="hero-stats">
                    <div><div class="hero-stat-value text-gradient" id="stat-count">0+</div><div class="hero-stat-label">أنمي</div></div>
                    <div><div class="hero-stat-value text-gradient">HD</div><div class="hero-stat-label">جودة</div></div>
                    <div><div class="hero-stat-value text-gradient">24/7</div><div class="hero-stat-label">متاح</div></div>
                </div>
            </div>
            <div class="hero-featured" id="hero-featured" style="display:none;">
                <div class="hero-featured-inner">
                    <div class="hero-featured-card">
                        <img id="hero-featured-img" src="" alt="">
                        <div class="hero-featured-info">
                            <div class="hero-featured-title" id="hero-featured-title"></div>
                            <div class="hero-featured-score">⭐ <span id="hero-featured-score"></span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<section id="anime-section">
    <div class="section-inner">
        <div class="section-header"><div class="section-bar"></div><h2 class="section-title">🎬 قائمة الأنمي</h2></div>
        <div id="anime-grid-container"><div class="spinner"></div></div>
    </div>
</section>

<div id="anime-modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-card">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-player" id="modal-player" style="display:none">
            <div class="modal-player-wrap"><iframe id="player-iframe" src="" allowfullscreen></iframe></div>
        </div>
        <div class="modal-body">
            <div class="modal-layout">
                <div class="modal-poster">
                    <img id="modal-poster" src="" alt="">
                    <div class="season-select-wrap">
                        <label>اختر الموسم:</label>
                        <select id="season-select" onchange="updateEpisodes(this.value)"></select>
                    </div>
                    <div id="sidebar-info" style="margin-top:15px; font-size:13px; color:var(--text-secondary)"></div>
                </div>
                <div class="modal-main">
                    <h1 id="modal-title" class="text-gradient"></h1>
                    <p id="modal-sub" style="color:var(--text-muted); margin-bottom:20px"></p>
                    <div class="modal-tabs">
                        <button class="modal-tab-btn active" onclick="switchTab(event,'tab-story')">▶ المشاهدة</button>
                        <button class="modal-tab-btn" onclick="switchTab(event,'tab-chars')">👥 الشخصيات</button>
                        <button class="modal-tab-btn" onclick="switchTab(event,'tab-staff')">🎬 الطاقم</button>
                    </div>
                    <div id="tab-story" class="tab-panel active"></div>
                    <div id="tab-chars" class="tab-panel" style="display:none"></div>
                    <div id="tab-staff" class="tab-panel" style="display:none"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="studio-overlay" onclick="if(event.target===this)closeStudioOverlay()">
    <div class="studio-card">
        <button class="modal-close" onclick="closeStudioOverlay()">✕</button>
        <div id="studio-content"></div>
    </div>
</div>

<script>
const SB_URL = "https://bdzbajkpaqkujbkvrjfu.supabase.co";
const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let allAnimeData = {};
let searchQuery = '';

async function translateAr(text) {
    if (!text) return "غير متوفر";
    try {
        const r = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ar&dt=t&q=${encodeURIComponent(text)}`);
        const d = await r.json();
        return d[0].map(s => s[0]).join('');
    } catch { return text; }
}

function toggleMobileSearch() {
    const bar = document.getElementById('mobile-search-bar');
    bar.classList.toggle('show');
}

function filterAnime(q) {
    searchQuery = q.toLowerCase();
    renderGrid();
}

async function renderGrid() {
    const container = document.getElementById('anime-grid-container');
    const entries = Object.values(allAnimeData).filter(d => d.anime);
    const filtered = entries.filter(d => d.anime.title.toLowerCase().includes(searchQuery));

    document.getElementById('stat-count').textContent = entries.length + "+";

    let html = '<div class="anime-grid">';
    filtered.forEach(d => {
        const a = d.anime;
        html += `
            <div class="anime-card" onclick="openModal(${a.mal_id})">
                <div class="anime-card-inner">
                    <div class="anime-card-img">
                        <img src="${a.images.jpg.large_image_url}" loading="lazy">
                        <div class="score-badge">⭐ ${a.score || 'N/A'}</div>
                        <div class="ep-badge">📺 ${d.episodes.length}</div>
                    </div>
                    <div class="anime-card-info">
                        <div class="anime-card-title">${a.title}</div>
                        <div class="genre-tag">${a.type}</div>
                    </div>
                </div>
            </div>`;
    });
    container.innerHTML = html + '</div>';
}

async function openModal(id) {
    const data = allAnimeData[id];
    const a = data.anime;
    const modal = document.getElementById('anime-modal');
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';

    document.getElementById('modal-title').textContent = a.title;
    document.getElementById('modal-poster').src = a.images.jpg.large_image_url;
    
    // Seasons
    const seasonsMap = {};
    data.episodes.forEach(e => {
        if(!seasonsMap[e.season_number]) seasonsMap[e.season_number] = [];
        seasonsMap[e.season_number].push(e);
    });
    
    const select = document.getElementById('season-select');
    const seasonKeys = Object.keys(seasonsMap).sort((x,y)=>x-y);
    select.innerHTML = seasonKeys.map(s => `<option value="${s}">الموسم ${s}</option>`).join('');

    window.currentSeasonsMap = seasonsMap;
    updateEpisodes(seasonKeys[0]);

    // Async Details
    const [arStory, charRes] = await Promise.all([
        translateAr(a.synopsis),
        fetch(`https://api.jikan.moe/v4/anime/${id}/characters`).then(r => r.json())
    ]);

    document.getElementById('tab-story').innerHTML = `<p style="line-height:1.8">${arStory}</p><div id="episodes-display" style="margin-top:20px"></div>`;
    updateEpisodes(select.value);

    const chars = (charRes.data || []).slice(0, 8);
    document.getElementById('tab-chars').innerHTML = `<div class="people-grid">${chars.map(c => `
        <div class="person-card">
            <img src="${c.character.images.jpg.image_url}">
            <div><div style="font-size:12px; font-weight:700">${c.character.name}</div><div style="font-size:10px; color:var(--accent)">${c.role}</div></div>
        </div>
    `).join('')}</div>`;
}

function updateEpisodes(sNum) {
    const eps = window.currentSeasonsMap[sNum] || [];
    const display = document.getElementById('episodes-display');
    if(!display) return;
    display.innerHTML = `<div class="episodes-grid">${eps.map(e => `<button class="episode-btn" onclick="playEp('${e.video_url}')">${e.episode_number}</button>`).join('')}</div>`;
}

function playEp(url) {
    const player = document.getElementById('modal-player');
    player.style.display = 'block';
    document.getElementById('player-iframe').src = url;
    document.getElementById('anime-modal').scrollTo({top:0, behavior:'smooth'});
}

function closeModal() {
    document.getElementById('anime-modal').classList.remove('open');
    document.body.style.overflow = '';
    document.getElementById('player-iframe').src = '';
}

function switchTab(e, id) {
    document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.modal-tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    e.currentTarget.classList.add('active');
}

async function init() {
    const { data: episodes } = await _supabase.from('episodes').select('*');
    const groups = {};
    episodes.forEach(e => { if(!groups[e.mal_id]) groups[e.mal_id] = []; groups[e.mal_id].push(e); });
    
    for (const id in groups) {
        allAnimeData[id] = { episodes: groups[id] };
        const res = await fetch(`https://api.jikan.moe/v4/anime/${id}`);
        const { data } = await res.json();
        allAnimeData[id].anime = data;
        renderGrid();
        if(id == Object.keys(groups)[0]) {
            document.getElementById('hero-featured').style.display = 'block';
            document.getElementById('hero-featured-img').src = data.images.jpg.large_image_url;
            document.getElementById('hero-featured-title').textContent = data.title;
            document.getElementById('hero-featured-score').textContent = data.score;
            document.getElementById('loading-screen').classList.add('hidden');
        }
        await new Promise(r => setTimeout(r, 400));
    }
}

init();
</script>
</body>
</html>
