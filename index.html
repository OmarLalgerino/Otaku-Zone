<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - عالم الأنمي العربي</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0a10'/%3E%3Ctext x='50' y='40' font-family='Arial Black' font-size='28' font-weight='900' fill='%23e63946' text-anchor='middle' dominant-baseline='middle'%3EOZ%3C/text%3E%3Ctext x='50' y='72' font-family='Arial' font-size='12' fill='%23888' text-anchor='middle'%3Eアニメ%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* تم الحفاظ على كافة التنسيقات الأصلية لضمان عدم تغيير شكل الموقع */
        :root {
            --bg-primary: #050508; --bg-secondary: #0c0c12; --bg-card: #12121a;
            --bg-card-hover: #1a1a25; --bg-modal: #0a0a10; --accent: #e63946;
            --accent-glow: #ff1a2e; --accent-dark: #b91c28; --gold: #ffd700;
            --gold-dim: #c4a000; --text-primary: #f0f0f5; --text-secondary: #8888a0;
            --text-muted: #55556a; --border: #1e1e2e; --border-accent: #2a2a3e;
            --telegram: #0088cc;
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f7; --bg-secondary: #ebebef; --bg-card: #ffffff;
            --bg-card-hover: #f0f0f5; --bg-modal: #ffffff; --text-primary: #111118;
            --text-secondary: #55556a; --text-muted: #9090a8; --border: #dcdce8;
            --border-accent: #c8c8da;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-primary); color: var(--text-primary);
            font-family: 'Noto Kufi Arabic', sans-serif; direction: rtl;
            overflow-x: hidden; transition: background-color 0.3s ease;
        }

        /* تنسيقات المشغل والنافذة المنبثقة */
        #anime-modal {
            position: fixed; inset: 0; z-index: 200;
            display: none; align-items: flex-start; justify-content: center;
            overflow-y: auto; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(4px); padding: 12px 8px;
        }
        #anime-modal.open { display: flex; }

        .modal-card {
            position: relative; width: 100%; max-width: 1100px;
            background: var(--bg-modal); border: 1px solid var(--border);
            border-radius: 20px; overflow: hidden; animation: fadeInUp 0.4s ease;
        }

        .modal-player { display: none; width: 100%; background: #000; }
        .modal-player.active { display: block; }
        .modal-player-wrap { position: relative; width: 100%; padding-bottom: 56.25%; }
        .modal-player-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

        .modal-close {
            position: absolute; top: 12px; left: 12px; z-index: 20;
            width: 36px; height: 36px; border-radius: 12px;
            background: rgba(18,18,26,0.9); border: 1px solid var(--border);
            color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* تنسيق أزرار الحلقات */
        .episodes-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 8px; margin-top: 15px;
        }
        .episode-btn {
            padding: 10px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text-secondary);
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .episode-btn:hover { border-color: var(--accent); color: var(--accent); }
        .episode-btn.active {
            background: var(--accent); color: white; border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(230, 57, 70, 0.3);
        }

        /* الأنيميشن */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* باقي التنسيقات الضرورية للهيكل */
        .modal-body { padding: 20px; }
        .modal-anime-title { font-size: 24px; font-weight: 900; margin-bottom: 10px; }
        .story-text { color: var(--text-secondary); line-height: 1.8; font-size: 14px; }
        
        /* إخفاء شاشة التحميل عند الجاهزية */
        #loading-screen.hidden { opacity: 0; pointer-events: none; }
        #loading-screen {
            position: fixed; inset: 0; z-index: 9999; background: var(--bg-primary);
            display: flex; align-items: center; justify-content: center; transition: 0.6s;
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <h2 style="color: var(--accent)">جاري تحميل عالمك...</h2>
</div>

<nav style="padding: 20px; text-align: center; border-bottom: 1px solid var(--border)">
    <h1 class="modal-anime-title"><span style="color: var(--accent)">OTAKU</span> ZONE</h1>
</nav>

<section id="anime-section" style="padding: 40px 20px;">
    <div id="anime-grid-container" class="episodes-grid">
        </div>
</section>

<div id="anime-modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-card">
        <button class="modal-close" onclick="closeModal()">✕</button>

        <div class="modal-player" id="modal-player">
            <div class="modal-player-wrap">
                <iframe id="player-iframe" src="" allowfullscreen allow="autoplay; fullscreen"></iframe>
            </div>
        </div>

        <div class="modal-body">
            <h1 class="modal-anime-title" id="modal-title"></h1>
            <p class="story-text" id="modal-story" style="margin-bottom: 20px;"></p>
            
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
            
            <h3 style="margin-bottom: 15px;">اختر الحلقة:</h3>
            <div id="episodes-display" class="episodes-grid">
                </div>
        </div>
    </div>
</div>

<script>
// إعدادات Supabase
const SB_URL = "https://bdzbajkpaqkujbkvrjfu.supabase.co";
const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let allAnimeData = {};

// دالة تشغيل الحلقة (السر في هذه الدالة)
function playEpisode(url, epNum) {
    // 1. تحديث شكل الأزرار (إضافة active للحلقة المختارة)
    document.querySelectorAll('.episode-btn').forEach(btn => btn.classList.remove('active'));
    const activeBtn = document.querySelector(`[data-ep="${epNum}"]`);
    if (activeBtn) activeBtn.classList.add('active');

    // 2. إظهار قسم المشغل إذا كان مخفياً
    const playerSection = document.getElementById('modal-player');
    playerSection.classList.add('active');

    // 3. تغيير رابط الـ iframe مباشرة دون إغلاق المودال
    const iframe = document.getElementById('player-iframe');
    iframe.src = url;

    // 4. تمرير الصفحة للأعلى لمشاهدة الفيديو فوراً
    document.getElementById('anime-modal').scrollTo({ top: 0, behavior: 'smooth' });
}

async function openModal(malId) {
    const data = allAnimeData[malId];
    if (!data) return;

    const modal = document.getElementById('anime-modal');
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';

    document.getElementById('modal-title').textContent = data.anime.title;
    document.getElementById('modal-story').textContent = data.anime.synopsis || "لا يوجد وصف حالياً.";
    
    // تصفير المشغل عند فتح أنمي جديد
    document.getElementById('modal-player').classList.remove('active');
    document.getElementById('player-iframe').src = "";

    // عرض الحلقات
    const episodesDiv = document.getElementById('episodes-display');
    const sortedEps = data.episodes.sort((a, b) => a.episode_number - b.episode_number);

    episodesDiv.innerHTML = sortedEps.map(e => `
        <button class="episode-btn" data-ep="${e.episode_number}" onclick="playEpisode('${e.video_url}', ${e.episode_number})">
            الحلقة ${e.episode_number}
        </button>
    `).join('');
}

function closeModal() {
    document.getElementById('anime-modal').classList.remove('open');
    document.getElementById('player-iframe').src = "";
    document.body.style.overflow = '';
}

// جلب البيانات عند البداية
async function init() {
    try {
        const { data: episodes } = await _supabase.from('episodes').select('*');
        const groups = {};
        episodes.forEach(e => {
            if (!groups[e.mal_id]) groups[e.mal_id] = [];
            groups[e.mal_id].push(e);
        });

        const container = document.getElementById('anime-grid-container');
        container.innerHTML = "";

        for (const malId in groups) {
            const res = await fetch(`https://api.jikan.moe/v4/anime/${malId}`);
            const { data: anime } = await res.json();
            allAnimeData[malId] = { anime, episodes: groups[malId] };

            // إضافة بطاقة الأنمي للشبكة
            container.innerHTML += `
                <div class="episode-btn" style="text-align:center; height: auto;" onclick="openModal(${malId})">
                    <img src="${anime.images.jpg.image_url}" style="width:100%; border-radius:8px; margin-bottom:10px;">
                    <div style="font-size:12px;">${anime.title}</div>
                </div>
            `;
        }
        document.getElementById('loading-screen').classList.add('hidden');
    } catch (e) {
        console.error(e);
    }
}

init();
</script>

</body>
</html>
