<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - عالم الأنمي العربي</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0a10'/%3E%3Ctext x='50' y='40' font-family='Arial Black' font-size='28' font-weight='900' fill='%23e63946' text-anchor='middle' dominant-baseline='middle'%3EOZ%3C/text%3E%3Ctext x='50' y='72' font-family='Arial' font-size='12' fill='%23888' text-anchor='middle'%3Eアニメ%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ===== THEME VARIABLES ===== */
        :root {
            --bg-primary: #050508;
            --bg-secondary: #0c0c12;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a25;
            --bg-modal: #0a0a10;
            --accent: #e63946;
            --accent-glow: #ff1a2e;
            --accent-dark: #b91c28;
            --gold: #ffd700;
            --gold-dim: #c4a000;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --border: #1e1e2e;
            --border-accent: #2a2a3e;
            --telegram: #0088cc;
        }

        /* ===== LIGHT MODE THEME ===== */
        [data-theme="light"] {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ebebef;
            --bg-card: #ffffff;
            --bg-card-hover: #f0f0f5;
            --bg-modal: #ffffff;
            --accent: #e63946;
            --accent-glow: #ff1a2e;
            --accent-dark: #b91c28;
            --gold: #c4900a;
            --gold-dim: #a07000;
            --text-primary: #111118;
            --text-secondary: #55556a;
            --text-muted: #9090a8;
            --border: #dcdce8;
            --border-accent: #c8c8da;
            --telegram: #006fa8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Noto Kufi Arabic', sans-serif;
            direction: rtl;
            overflow-x: hidden;
            min-height: 100vh;
            width: 100%;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        *, *::before, *::after { max-width: 100%; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

        /* ===== ANIMATIONS ===== */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(230, 57, 70, 0.1); }
            50% { box-shadow: 0 0 40px rgba(230, 57, 70, 0.25); }
        }
        @keyframes loadingBar {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== NOTICE BANNER ANIMATION ===== */
        @keyframes slideDown {
            from { transform: translateY(-110%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(0); opacity: 1; max-height: 200px; }
            to { transform: translateY(-110%); opacity: 0; max-height: 0; }
        }

        /* ===== APOLOGY NOTICE BANNER ===== */
        #apology-notice {
            position: fixed; top: 0; left: 0; right: 0; z-index: 9998;
            transform: translateY(-110%); opacity: 0; will-change: transform, opacity;
        }
        #apology-notice.slide-in {
            animation: slideDown 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        #apology-notice.slide-out {
            animation: slideUp 0.4s ease-in forwards;
        }

        .notice-inner {
            background: linear-gradient(135deg, #1a0d0e 0%, #120a0b 50%, #1a0d0e 100%);
            border-bottom: 1px solid rgba(230, 57, 70, 0.35);
            padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6), 0 1px 0 rgba(230, 57, 70, 0.2) inset;
            position: relative; overflow: hidden;
        }

        .notice-inner::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(230,57,70,0.04) 50%, transparent 100%);
            background-size: 200% 100%; animation: shimmer 3s infinite; pointer-events: none;
        }

        .notice-inner::after {
            content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 3px;
            background: linear-gradient(to bottom, transparent, var(--accent), transparent);
        }

        [data-theme="light"] .notice-inner {
            background: linear-gradient(135deg, #fff0f1 0%, #fff5f5 50%, #fff0f1 100%);
            border-bottom-color: rgba(230, 57, 70, 0.25);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12), 0 1px 0 rgba(230, 57, 70, 0.15) inset;
        }

        .notice-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; filter: drop-shadow(0 0 6px rgba(230,57,70,0.5)); }
        .notice-content { flex: 1; min-width: 0; }
        .notice-title { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 4px; letter-spacing: 0.3px; text-shadow: 0 0 20px rgba(230,57,70,0.3); }
        .notice-text { font-size: 12px; color: var(--text-secondary); line-height: 1.75; }
        [data-theme="light"] .notice-text { color: #55556a; }

        .notice-close {
            flex-shrink: 0; width: 28px; height: 28px; border-radius: 8px; background: rgba(230, 57, 70, 0.1);
            border: 1px solid rgba(230, 57, 70, 0.2); color: var(--text-muted); font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.25s ease;
        }
        .notice-close:hover { background: var(--accent); border-color: var(--accent); color: white; transform: scale(1.1); }

        /* ===== NAVBAR, HERO, GRID CSS (النسخة الكاملة) ===== */
        .shimmer-bg { background: linear-gradient(90deg, transparent 0%, rgba(230,57,70,0.06) 50%, transparent 100%); background-size: 200% 100%; animation: shimmer 2.5s infinite; }
        .text-gradient { background: linear-gradient(135deg, #e63946, #ff6b6b, #e63946); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        
        #loading-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease; }
        #loading-screen.hidden { opacity: 0; pointer-events: none; }
        #loading-screen .logo-text { font-family: 'Outfit', sans-serif; font-size: 48px; font-weight: 900; letter-spacing: 4px; }
        .loading-bar-track { margin-top: 32px; width: 192px; height: 4px; background: var(--bg-card); border-radius: 4px; overflow: hidden; }
        .loading-bar-fill { height: 100%; width: 50%; background: linear-gradient(90deg, transparent, var(--accent), transparent); animation: loadingBar 1s ease-in-out infinite; }

        #navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; transition: all 0.4s ease; background: transparent; }
        #navbar.scrolled { background: rgba(5,5,8,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 72px; }
        .nav-logo-icon { width: 44px; height: 44px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; }
        
        .nav-search { flex: 1; max-width: 420px; margin: 0 16px; position: relative; }
        .nav-search input { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 10px 42px 10px 16px; color: var(--text-primary); outline: none; }
        .theme-toggle-btn { width: 38px; height: 38px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #hero { position: relative; min-height: 90vh; display: flex; align-items: center; padding-top: 80px; }
        .hero-title { font-size: clamp(28px, 6vw, 72px); font-weight: 900; line-height: 1.15; margin-bottom: 24px; }
        .btn-primary { padding: 14px 28px; background: var(--accent); border-radius: 16px; color: white; font-weight: 700; border: none; cursor: pointer; }

        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
        .anime-card { cursor: pointer; transition: transform 0.3s ease; }
        .anime-card:hover { transform: translateY(-6px); }
        .anime-card-inner { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .anime-card-img { position: relative; aspect-ratio: 3/4; overflow: hidden; }
        .anime-card-img img { width: 100%; height: 100%; object-fit: cover; }

        #anime-modal { position: fixed; inset: 0; z-index: 200; display: none; align-items: flex-start; justify-content: center; overflow-y: auto; background: rgba(0,0,0,0.95); backdrop-filter: blur(4px); padding: 12px 8px 32px; }
        #anime-modal.open { display: flex; }
        .modal-card { position: relative; width: 100%; max-width: 1100px; background: var(--bg-modal); border-radius: 24px; overflow: hidden; animation: fadeInUp 0.4s ease; }
        .modal-close { position: absolute; top: 12px; left: 12px; z-index: 20; width: 36px; height: 36px; border-radius: 12px; background: rgba(18,18,26,0.9); border: 1px solid var(--border); color: white; cursor: pointer; }

        .modal-player { display: none; width: 100%; background: #000; }
        .modal-player.active { display: block; }
        .modal-player-wrap { position: relative; width: 100%; padding-bottom: 56.25%; }
        .modal-player-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

        .season-pill { padding: 6px 13px; border-radius: 50px; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-secondary); margin: 2px; }
        .season-pill.active { background: var(--accent); color: white; border-color: var(--accent); }

        .episode-btn { padding: 9px 4px; border-radius: 10px; font-weight: 700; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; transition: 0.3s; }
        .episode-btn.active { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.04); }

        #footer { margin-top: 48px; border-top: 1px solid var(--border); padding: 40px 16px; text-align: center; }
    </style>
</head>
<body>

<div id="apology-notice">
    <div class="notice-inner">
        <div class="notice-icon">🔔</div>
        <div class="notice-content">
            <div class="notice-title">تنويه واعتذار:</div>
            <div class="notice-text">نعتذر بشدة لمتابعينا الكرام عن أي إعلانات غير لائقة قد تظهر بشكل تلقائي. نحن نعمل الآن على حظر هذه الفئات لضمان بيئة مشاهدة آمنة.</div>
        </div>
        <button class="notice-close" onclick="closeApologyNotice()">✕</button>
    </div>
</div>

<div id="loading-screen">
    <div class="logo-text"><span class="text-gradient">OTAKU</span> ZONE</div>
    <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
</div>

<nav id="navbar">
    <div class="nav-inner">
        <div class="nav-logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">
            <div class="nav-logo-icon">OZ</div>
            <div class="nav-logo-text"><h1>OTAKU ZONE</h1></div>
        </div>
        <div class="nav-search">
            <input type="text" id="desktop-search" placeholder="ابحث عن أنمي..." oninput="filterAnime(this.value)">
        </div>
        <div class="nav-actions">
            <button class="theme-toggle-btn" onclick="toggleTheme()">🌙</button>
            <a href="https://t.me/OtakuZoen" class="btn-primary" style="padding: 8px 15px; font-size: 13px;">تيليجرام</a>
        </div>
    </div>
</nav>

<section id="hero">
    <div class="hero-content" style="max-width:1280px; margin:0 auto; padding:0 16px;">
        <h1 class="hero-title"><span class="text-gradient">عالم الأنمي</span> بين يديك</h1>
        <p style="color:var(--text-secondary); margin-bottom:30px;">شاهد أحدث مسلسلات الأنمي مترجمة بجودة عالية.</p>
        <button class="btn-primary" onclick="document.getElementById('anime-section').scrollIntoView({behavior:'smooth'})">ابدأ المشاهدة</button>
    </div>
</section>

<section id="anime-section" style="padding: 40px 16px;">
    <div id="studio-filter-bar" style="display:none; margin-bottom:20px;">
        <div class="season-pill active"><span id="studio-filter-name"></span> <button onclick="clearStudioFilter()" style="background:none; border:none; color:white; cursor:pointer;">✕</button></div>
    </div>
    <div id="anime-grid-container"></div>
</section>

<div id="anime-modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-card">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-player" id="modal-player">
            <div class="modal-player-wrap">
                <iframe id="player-iframe" src="" allowfullscreen allow="autoplay; fullscreen"></iframe>
            </div>
        </div>
        <div class="modal-body" style="padding:20px;">
            <h1 id="modal-title" class="text-gradient"></h1>
            <div id="season-pills" style="margin: 15px 0;"></div>
            <div id="episodes-display" class="anime-grid" style="grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px;"></div>
            <div id="tab-story" style="margin-top:20px; color:var(--text-secondary); line-height:1.6;"></div>
        </div>
    </div>
</div>

<footer id="footer">
    <p>© 2026 Otaku Zone. صُنع بـ ❤️ لعشاق الأنمي</p>
</footer>

<script>
const SB_URL = "https://bdzbajkpaqkujbkvrjfu.supabase.co";
const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let allAnimeData = {};
let currentSeasonsMap = {};
let searchQuery = '';
let studioFilter = '';

function closeApologyNotice() { document.getElementById('apology-notice').style.display = 'none'; }

function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const target = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', target);
}

async function playEpisode(url, epNum) {
    document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById(`ep-btn-${epNum}`);
    if (btn) btn.classList.add('active');

    const player = document.getElementById('modal-player');
    const iframe = document.getElementById('player-iframe');
    
    player.classList.add('active');
    
    // التعديل الأساسي لحل مشكلة التعليق
    iframe.src = "about:blank"; 
    setTimeout(() => {
        iframe.src = url;
    }, 100);

    document.getElementById('anime-modal').scrollTo({ top: 0, behavior: 'smooth' });
}

async function openModal(malId) {
    const data = allAnimeData[malId];
    if (!data) return;

    const a = data.anime;
    document.getElementById('anime-modal').classList.add('open');
    document.getElementById('modal-title').textContent = a.title;
    document.getElementById('tab-story').textContent = a.synopsis;
    document.getElementById('player-iframe').src = '';
    document.getElementById('modal-player').classList.remove('active');

    currentSeasonsMap = {};
    data.episodes.forEach(e => {
        if (!currentSeasonsMap[e.season_number]) currentSeasonsMap[e.season_number] = [];
        currentSeasonsMap[e.season_number].push(e);
    });

    const seasons = Object.keys(currentSeasonsMap).sort((a,b) => a-b);
    const pills = document.getElementById('season-pills');
    pills.innerHTML = seasons.map(s => `<button class="season-pill ${s==seasons[0]?'active':''}" onclick="showSeason(${malId}, ${s}, this)">الموسم ${s}</button>`).join('');
    
    showSeason(malId, seasons[0]);
}

function showSeason(malId, s, btn) {
    if(btn) {
        document.querySelectorAll('.season-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
    }
    const eps = currentSeasonsMap[s].sort((a,b) => a.episode_number - b.episode_number);
    document.getElementById('episodes-display').innerHTML = eps.map(e => `
        <button class="episode-btn" id="ep-btn-${e.episode_number}" onclick="playEpisode('${e.video_url}', ${e.episode_number})">${e.episode_number}</button>
    `).join('');
}

function closeModal() { 
    document.getElementById('anime-modal').classList.remove('open'); 
    document.getElementById('player-iframe').src = '';
}

function filterAnime(q) {
    searchQuery = q.toLowerCase();
    renderGrid();
}

function renderGrid() {
    const container = document.getElementById('anime-grid-container');
    let filtered = Object.values(allAnimeData).filter(d => d.anime);
    
    if (searchQuery) {
        filtered = filtered.filter(d => d.anime.title.toLowerCase().includes(searchQuery));
    }

    container.innerHTML = `<div class="anime-grid">${filtered.map(d => `
        <div class="anime-card" onclick="openModal(${d.anime.mal_id})">
            <div class="anime-card-inner">
                <div class="anime-card-img"><img src="${d.anime.images.jpg.large_image_url}"></div>
                <div style="padding:10px; font-size:12px; font-weight:700;">${d.anime.title}</div>
            </div>
        </div>
    `).join('')}</div>`;
}

async function init() {
    const { data: episodes } = await _supabase.from('episodes').select('*');
    episodes.forEach(e => {
        if (!allAnimeData[e.mal_id]) allAnimeData[e.mal_id] = { episodes: [] };
        allAnimeData[e.mal_id].episodes.push(e);
    });

    const ids = Object.keys(allAnimeData);
    for (let id of ids) {
        const res = await fetch(`https://api.jikan.moe/v4/anime/${id}`);
        const { data } = await res.json();
        allAnimeData[id].anime = data;
        renderGrid();
        await new Promise(r => setTimeout(r, 400));
    }
    document.getElementById('loading-screen').classList.add('hidden');
    setTimeout(() => document.getElementById('apology-notice').classList.add('slide-in'), 1000);
}

init();
</script>
</body>
</html>
