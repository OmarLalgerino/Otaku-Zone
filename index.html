<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - قائمة الحلقات الاحترافية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050508; 
            --card: #12121a; 
            --accent: #e63946; 
            --text: #f0f0f5; 
            --text-dim: #8888a0;
            --border: #1e1e2e; 
        }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Kufi Arabic', sans-serif; margin: 0; direction: rtl; }

        /* Modal & Layout */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; z-index: 1000; overflow-y: auto; }
        #modal.open { display: block; }
        .modal-content { max-width: 800px; margin: 20px auto; background: #fff; color: #333; border-radius: 15px; overflow: hidden; }
        
        /* Video Player Section */
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 0; z-index: 10; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Header in List */
        .list-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; background: #f9f9f9; }
        .list-title { font-weight: 800; font-size: 18px; }
        .search-box { background: #fff; border: 1px solid #ddd; padding: 5px 15px; border-radius: 8px; width: 60%; display: flex; align-items: center; }
        .search-box input { border: none; outline: none; width: 100%; font-family: inherit; font-size: 14px; }

        /* Episodes List Style (The New Idea) */
        .episodes-list { padding: 0; margin: 0; list-style: none; }
        .episode-item { 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            border-bottom: 1px solid #f0f0f0; 
            cursor: pointer; 
            transition: 0.2s;
            position: relative;
        }
        .episode-item:hover { background: #f8f8f8; }
        .episode-item.active { background: #fff5f5; border-right: 4px solid var(--accent); }

        .play-icon { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-left: 15px; font-size: 12px; }
        .play-icon.played { background: #000; color: #fff; }
        .play-icon.current { background: #ffc107; color: #000; }

        .ep-info { flex-grow: 1; }
        .ep-info h4 { margin: 0; font-size: 15px; font-weight: 700; }
        .ep-info p { margin: 3px 0 0; font-size: 12px; color: #777; }

        .ep-thumb { width: 100px; height: 60px; border-radius: 6px; object-fit: cover; margin-right: 15px; }

        .close-btn { position: fixed; top: 20px; left: 20px; z-index: 1100; background: var(--accent); border: none; color: white; padding: 10px 15px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<button class="close-btn" onclick="closeModal()">✕</button>

<div id="modal">
    <div class="modal-content">
        <div class="player-wrapper">
            <iframe id="main-player" src="" allowfullscreen></iframe>
        </div>

        <div class="list-header">
            <div class="list-title">قائمة الحلقات</div>
            <div class="search-box">
                <input type="text" placeholder="البحث عن حلقة..." oninput="filterEpisodes(this.value)">
            </div>
        </div>

        <div class="episodes-list" id="episodes-list">
            </div>
    </div>
</div>

<script>
const SB_URL = "https://bdzbajkpaqkujbkvrjfu.supabase.co";
const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let allEpisodes = []; // لتخزين الحلقات الحالية للفلترة

// دالة تجريبية لفتح المودال (يجب ربطها ببطاقة الأنمي لديك)
async function openModal(malId) {
    const { data, error } = await _supabase
        .from('episodes')
        .select('*')
        .eq('mal_id', malId)
        .order('episode_number', { ascending: true });

    if (error) return;
    allEpisodes = data;
    renderList(allEpisodes);
    document.getElementById('modal').classList.add('open');
}

function renderList(list) {
    const container = document.getElementById('episodes-list');
    container.innerHTML = list.map(ep => `
        <div class="episode-item" id="item-${ep.episode_number}" onclick="playNow('${ep.video_url}', ${ep.episode_number})">
            <div class="play-icon ${ep.episode_number > 5 ? 'played' : 'current'}">
                ${ep.episode_number > 5 ? '▶' : '●'}
            </div>
            <div class="ep-info">
                <h4>الحلقة ${ep.episode_number}</h4>
                <p>Season: ${ep.season_number}-hen</p>
            </div>
            <img class="ep-thumb" src="${ep.thumbnail || 'https://via.placeholder.com/100x60?text=OZ'}" alt="thumb">
        </div>
    `).join('');
}

function playNow(url, num) {
    // 1. تحديث المشغل
    document.getElementById('main-player').src = url;

    // 2. تحديث الشكل البصري للقائمة
    document.querySelectorAll('.episode-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`item-${num}`).classList.add('active');

    // 3. التمرير للأعلى للمشغل
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function filterEpisodes(term) {
    const filtered = allEpisodes.filter(ep => ep.episode_number.toString().includes(term));
    renderList(filtered);
}

function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.getElementById('main-player').src = "";
}

// تشغيل تجريبي (للعرض فقط)
// openModal(51009); 
</script>
</body>
</html>
