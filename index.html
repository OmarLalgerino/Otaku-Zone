<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - عالم الأنمي العربي</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0a10'/%3E%3Ctext x='50' y='40' font-family='Arial Black' font-size='28' font-weight='900' fill='%23e63946' text-anchor='middle' dominant-baseline='middle'%3EOZ%3C/text%3E%3Ctext x='50' y='72' font-family='Arial' font-size='12' fill='%23888' text-anchor='middle'%3Eアニメ%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* تم الإبقاء على جميع التنسيقات (CSS) كما هي في ملفك الأصلي */
        :root {
            --bg-primary: #050508;
            --bg-secondary: #0c0c12;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a25;
            --bg-modal: #0a0a10;
            --accent: #e63946;
            --accent-glow: #ff1a2e;
            --accent-dark: #b91c28;
            --gold: #ffd700;
            --gold-dim: #c4a000;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --border: #1e1e2e;
            --border-accent: #2a2a3e;
            --telegram: #0088cc;
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ebebef;
            --bg-card: #ffffff;
            --bg-card-hover: #f0f0f5;
            --bg-modal: #ffffff;
            --accent: #e63946;
            --accent-glow: #ff1a2e;
            --accent-dark: #b91c28;
            --gold: #c4900a;
            --gold-dim: #a07000;
            --text-primary: #111118;
            --text-secondary: #55556a;
            --text-muted: #9090a8;
            --border: #dcdce8;
            --border-accent: #c8c8da;
            --telegram: #006fa8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Noto Kufi Arabic', sans-serif;
            direction: rtl;
            overflow-x: hidden;
            min-height: 100vh;
            width: 100%;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        *, *::before, *::after { max-width: 100%; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(230, 57, 70, 0.1); } 50% { box-shadow: 0 0 40px rgba(230, 57, 70, 0.25); } }
        @keyframes loadingBar { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideDown { from { transform: translateY(-110%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(0); opacity: 1; max-height: 200px; } to { transform: translateY(-110%); opacity: 0; max-height: 0; } }

        #apology-notice { position: fixed; top: 0; left: 0; right: 0; z-index: 9998; transform: translateY(-110%); opacity: 0; will-change: transform, opacity; }
        #apology-notice.slide-in { animation: slideDown 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        #apology-notice.slide-out { animation: slideUp 0.4s ease-in forwards; }
        .notice-inner { background: linear-gradient(135deg, #1a0d0e 0%, #120a0b 50%, #1a0d0e 100%); border-bottom: 1px solid rgba(230, 57, 70, 0.35); padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6), 0 1px 0 rgba(230, 57, 70, 0.2) inset; position: relative; overflow: hidden; }
        .notice-inner::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, rgba(230,57,70,0.04) 50%, transparent 100%); background-size: 200% 100%; animation: shimmer 3s infinite; pointer-events: none; }
        .notice-inner::after { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(to bottom, transparent, var(--accent), transparent); }
        [data-theme="light"] .notice-inner { background: linear-gradient(135deg, #fff0f1 0%, #fff5f5 50%, #fff0f1 100%); border-bottom-color: rgba(230, 57, 70, 0.25); box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12), 0 1px 0 rgba(230, 57, 70, 0.15) inset; }
        .notice-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; filter: drop-shadow(0 0 6px rgba(230,57,70,0.5)); }
        .notice-content { flex: 1; min-width: 0; }
        .notice-title { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 4px; letter-spacing: 0.3px; text-shadow: 0 0 20px rgba(230,57,70,0.3); }
        .notice-text { font-size: 12px; color: var(--text-secondary); line-height: 1.75; }
        [data-theme="light"] .notice-text { color: #55556a; }
        .notice-close { flex-shrink: 0; width: 28px; height: 28px; border-radius: 8px; background: rgba(230, 57, 70, 0.1); border: 1px solid rgba(230, 57, 70, 0.2); color: var(--text-muted); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s ease; font-family: inherit; line-height: 1; margin-top: 1px; }
        .notice-close:hover { background: var(--accent); border-color: var(--accent); color: white; transform: scale(1.1); }
        .shimmer-bg { background: linear-gradient(90deg, transparent 0%, rgba(230,57,70,0.06) 50%, transparent 100%); background-size: 200% 100%; animation: shimmer 2.5s infinite; }
        .text-gradient { background: linear-gradient(135deg, #e63946, #ff6b6b, #e63946); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .gold-gradient { background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        #loading-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease; }
        #loading-screen.hidden { opacity: 0; pointer-events: none; }
        #loading-screen .logo-wrap { position: relative; animation: scaleIn 0.6s ease-out; }
        #loading-screen .logo-glow { position: absolute; inset: -32px; background: rgba(230,57,70,0.1); border-radius: 50%; filter: blur(30px); animation: pulse-glow 2s infinite; }
        #loading-screen .logo-text { position: relative; font-family: 'Outfit', sans-serif; font-size: 48px; font-weight: 900; letter-spacing: 4px; }
        #loading-screen .loading-bar-track { margin-top: 32px; width: 192px; height: 4px; background: var(--bg-card); border-radius: 4px; overflow: hidden; }
        #loading-screen .loading-bar-fill { height: 100%; width: 50%; background: linear-gradient(90deg, transparent, var(--accent), transparent); border-radius: 4px; animation: loadingBar 1s ease-in-out infinite; }
        #loading-screen .loading-text { margin-top: 16px; color: var(--text-muted); font-size: 14px; animation: fadeIn 0.5s ease 0.7s both; }

        /* Navbar */
        #navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; transition: all 0.4s ease; background: transparent; }
        #navbar.scrolled { background: rgba(5,5,8,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        [data-theme="light"] #navbar.scrolled { background: rgba(245,245,247,0.92); }
        .nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 72px; }
        .nav-logo { display: flex; align-items: center; gap: 12px; cursor: pointer; transition: transform 0.2s; flex-shrink: 0; }
        .nav-logo:hover { transform: scale(1.03); }
        .nav-logo-icon { width: 44px; height: 44px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 18px; color: white; letter-spacing: 1px; flex-shrink: 0; }
        .nav-logo-text h1 { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 2px; }
        .nav-logo-text p { font-size: 10px; color: var(--text-muted); letter-spacing: 3px; margin-top: 2px; }
        .nav-search { flex: 1; max-width: 420px; margin: 0 16px; position: relative; }
        .nav-search input { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 10px 42px 10px 16px; color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none; }
        .nav-actions { display: flex; align-items: center; gap: 8px; }
        .theme-toggle-btn { width: 38px; height: 38px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; font-size: 16px; color: var(--text-secondary); }
        .telegram-btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(0,136,204,0.1); border: 1px solid rgba(0,136,204,0.3); border-radius: 14px; color: var(--telegram); font-size: 14px; text-decoration: none; }

        /* Anime Grid */
        #anime-section { padding: 40px 16px 64px; }
        .section-inner { max-width: 1280px; margin: 0 auto; }
        .section-header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
        .section-bar { width: 6px; height: 40px; background: var(--accent); border-radius: 6px; }
        .section-title { font-size: clamp(20px, 4vw, 28px); font-weight: 900; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
        .anime-card { cursor: pointer; transition: transform 0.3s ease; }
        .anime-card:hover { transform: translateY(-6px); }
        .anime-card-inner { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .anime-card-img { position: relative; aspect-ratio: 3/4; overflow: hidden; }
        .anime-card-img img { width: 100%; height: 100%; object-fit: cover; }
        .score-badge { position: absolute; top: 8px; right: 8px; padding: 3px 8px; background: rgba(0,0,0,0.75); border-radius: 8px; color: var(--gold); font-size: 11px; font-weight: 700; }
        .ep-badge { position: absolute; top: 8px; left: 8px; padding: 3px 8px; background: rgba(230, 57, 70, 0.85); border-radius: 8px; color: white; font-size: 11px; font-weight: 700; }
        .anime-card-info { padding: 12px; }
        .anime-card-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; }

        /* Modal & Player */
        #anime-modal { position: fixed; inset: 0; z-index: 200; display: none; align-items: flex-start; justify-content: center; overflow-y: auto; background: rgba(0,0,0,0.95); backdrop-filter: blur(4px); padding: 20px; }
        #anime-modal.open { display: flex; }
        .modal-card { position: relative; width: 100%; max-width: 1100px; background: var(--bg-modal); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; animation: fadeInUp 0.4s ease; }
        .modal-close { position: absolute; top: 12px; left: 12px; z-index: 20; width: 36px; height: 36px; background: rgba(18,18,26,0.9); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; color: white; }
        .modal-player { display: none; width: 100%; background: #000; }
        .modal-player.active { display: block; }
        .modal-player-wrap { position: relative; padding-bottom: 56.25%; }
        .modal-player-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
        .modal-body { padding: 32px; }
        .modal-layout { display: flex; gap: 28px; }
        .modal-poster { width: 248px; flex-shrink: 0; }
        .modal-poster img { width: 100%; border-radius: 14px; border: 1px solid var(--border); }
        .modal-main { flex: 1; }
        .modal-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .modal-tab-btn { padding: 10px 20px; border-radius: 10px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; }
        .modal-tab-btn.active { background: var(--accent); color: white; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; margin-top: 15px; }
        .episode-btn { padding: 10px; border-radius: 10px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); cursor: pointer; font-weight: 700; transition: 0.3s; }
        .episode-btn.active { background: var(--accent); border-color: var(--accent); color: white; transform: scale(1.05); }

        /* Media Queries for Mobile */
        @media (max-width: 768px) {
            .modal-layout { flex-direction: column; }
            .modal-poster { width: 150px; margin: 0 auto; }
            .modal-body { padding: 15px; }
            .nav-search { display: none; }
        }
    </style>
</head>
<body>

<div id="apology-notice">
    <div class="notice-inner">
        <div class="notice-icon">🔔</div>
        <div class="notice-content">
            <div class="notice-title">تنويه واعتذار:</div>
            <div class="notice-text">نعتذر بشدة لمتابعينا الكرام عن أي إعلانات غير لائقة قد تظهر بشكل تلقائي. نحن نعمل على حظر هذه المصادر لضمان بيئة مشاهدة آمنة.</div>
        </div>
        <button class="notice-close" onclick="closeApologyNotice()">✕</button>
    </div>
</div>

<div id="loading-screen">
    <div class="logo-wrap">
        <div class="logo-glow"></div>
        <div class="logo-text"><span class="text-gradient">OTAKU</span><span> ZONE</span></div>
    </div>
    <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
</div>

<nav id="navbar">
    <div class="nav-inner">
        <div class="nav-logo" onclick="location.reload()">
            <div class="nav-logo-icon">OZ</div>
            <div class="nav-logo-text"><h1>OTAKU ZONE</h1></div>
        </div>
        <div class="nav-actions">
            <button class="theme-toggle-btn" onclick="toggleTheme()">🌙</button>
            <a href="https://t.me/OtakuZoen" class="telegram-btn">✈️ تيليجرام</a>
        </div>
    </div>
</nav>

<section id="anime-section">
    <div class="section-inner">
        <div class="section-header">
            <div class="section-bar"></div>
            <h2 class="section-title">🎬 قائمة الأنمي المتاحة</h2>
        </div>
        <div id="anime-grid-container">
            <div class="grid-loading"><p>جاري تحميل الأنميات من Supabase...</p></div>
        </div>
    </div>
</section>

<div id="anime-modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-card">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-player" id="modal-player">
            <div class="modal-player-wrap">
                <iframe id="player-iframe" src="" allowfullscreen></iframe>
            </div>
        </div>
        <div class="modal-body">
            <div class="modal-layout">
                <div class="modal-poster">
                    <img id="modal-poster-img" src="" alt="">
                </div>
                <div class="modal-main">
                    <h1 id="modal-title" class="text-gradient"></h1>
                    <div class="modal-tabs">
                        <button class="modal-tab-btn active">المشاهدة</button>
                    </div>
                    <div id="episodes-display" class="episodes-grid"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// إعدادات Supabase
const SB_URL = "https://bdzbajkpaqkujbkvrjfu.supabase.co";
const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let allAnimeData = {};

// === دالة تشغيل الحلقة (الحل التقني لمشكلتك) ===
function playEpisode(url, epNum) {
    // 1. تمييز الزر المختار
    document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById(`ep-btn-${epNum}`);
    if (btn) btn.classList.add('active');

    // 2. تحديث المشغل فوراً
    const player = document.getElementById('modal-player');
    const iframe = document.getElementById('player-iframe');
    
    player.classList.add('active');
    
    // إفراغ المشغل القديم قبل وضع الجديد لضمان التحديث
    iframe.src = "about:blank";
    setTimeout(() => {
        iframe.src = url;
    }, 50);

    // 3. تحريك الصفحة لمكان الفيديو
    document.getElementById('anime-modal').scrollTo({ top: 0, behavior: 'smooth' });
}

async function openModal(malId) {
    const data = allAnimeData[malId];
    if (!data) return;

    const modal = document.getElementById('anime-modal');
    document.getElementById('modal-title').textContent = data.anime.title;
    document.getElementById('modal-poster-img').src = data.anime.images.jpg.large_image_url;
    
    // عرض الحلقات
    const episodesDiv = document.getElementById('episodes-display');
    episodesDiv.innerHTML = data.episodes.map(e => `
        <button class="episode-btn" id="ep-btn-${e.episode_number}" onclick="playEpisode('${e.video_url}', ${e.episode_number})">
            حلقة ${e.episode_number}
        </button>
    `).join('');

    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('anime-modal').classList.remove('open');
    document.getElementById('player-iframe').src = "";
    document.body.style.overflow = 'auto';
}

function toggleTheme() {
    const body = document.documentElement;
    const current = body.getAttribute('data-theme');
    body.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
}

function closeApologyNotice() {
    document.getElementById('apology-notice').style.display = 'none';
}

// جلب البيانات عند البداية
async function init() {
    try {
        const { data: episodes, error } = await _supabase.from('episodes').select('*');
        if (error) throw error;

        const groups = {};
        episodes.forEach(e => {
            if (!groups[e.mal_id]) groups[e.mal_id] = [];
            groups[e.mal_id].push(e);
        });

        const container = document.getElementById('anime-grid-container');
        container.innerHTML = '<div class="anime-grid"></div>';
        const grid = container.querySelector('.anime-grid');

        for (const malId in groups) {
            const res = await fetch(`https://api.jikan.moe/v4/anime/${malId}`);
            const { data: anime } = await res.json();
            
            allAnimeData[malId] = { anime, episodes: groups[malId] };

            grid.innerHTML += `
                <div class="anime-card" onclick="openModal(${malId})">
                    <div class="anime-card-inner">
                        <div class="anime-card-img">
                            <img src="${anime.images.jpg.image_url}">
                            <div class="ep-badge">${groups[malId].length} حلقة</div>
                        </div>
                        <div class="anime-card-info">
                            <div class="anime-card-title">${anime.title}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        document.getElementById('loading-screen').classList.add('hidden');
        setTimeout(() => document.getElementById('apology-notice').classList.add('slide-in'), 1000);
    } catch (e) {
        console.error(e);
    }
}

init();
</script>
</body>
</html>
