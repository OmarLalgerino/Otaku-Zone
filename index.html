<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Otaku Zone - عالم الأنمي العربي</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* المتغيرات الأساسية */
        :root {
            --bg-primary: #050508;
            --bg-secondary: #0c0c12;
            --bg-card: #12121a;
            --accent: #e63946;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --border: #1e1e2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-primary); color: var(--text-primary); font-family: 'Noto Kufi Arabic', sans-serif; line-height: 1.6; }

        /* تحسين الهيدر للهاتف */
        #navbar {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(5, 5, 8, 0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            display: flex; justify-content: space-between; align-items: center;
            height: 65px; padding: 0 15px;
        }
        .nav-logo-icon { width: 35px; height: 35px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        
        /* البحث في الهاتف */
        #mobile-search-bar {
            display: none; padding: 10px 15px; background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }
        #mobile-search-bar.show { display: block; animation: fadeIn 0.3s; }
        #mobile-search-bar input {
            width: 100%; padding: 12px; border-radius: 10px; background: var(--bg-card);
            border: 1px solid var(--border); color: white; outline: none;
        }

        /* تحسين قسم Hero للهاتف */
        #hero { padding: 100px 20px 40px; text-align: center; }
        .hero-title { font-size: 2.2rem; margin-bottom: 15px; }
        .hero-desc { font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 25px; }
        .hero-buttons { display: flex; flex-direction: column; gap: 12px; }
        .btn-primary, .btn-secondary { width: 100%; justify-content: center; padding: 15px; border-radius: 12px; }

        /* شبكة الأنمي - عمودين في الهاتف */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px; padding: 15px;
        }
        .anime-card-inner { border-radius: 12px; background: var(--bg-card); overflow: hidden; }
        .anime-card-img { position: relative; aspect-ratio: 2/3; }
        .anime-card-title { font-size: 0.85rem; padding: 8px; height: 45px; overflow: hidden; }

        /* المودال (نافذة التفاصيل) - تعديل الهاتف */
        .modal-card {
            margin: 0; width: 100%; min-height: 100vh; border-radius: 0;
            display: flex; flex-direction: column;
        }
        .modal-body { padding: 15px; }
        .modal-layout { flex-direction: column !important; }
        .modal-poster { width: 120px !important; margin: 0 auto 15px; }
        .modal-tabs { 
            display: flex; overflow-x: auto; white-space: nowrap; 
            padding-bottom: 5px; gap: 10px;
        }
        .modal-tab-btn { flex: 0 0 auto; }

        /* شبكة الحلقات - أزرار أكبر للمس */
        .episodes-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
        }
        .episode-btn { padding: 15px 5px; font-size: 1rem; }

        /* الاستوديو في الهاتف */
        .studio-grid { grid-template-columns: repeat(2, 1fr) !important; }

        /* شاشات العرض الكبيرة */
        @media (min-width: 768px) {
            .hero-buttons { flex-direction: row; }
            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
            .modal-card { margin: 24px auto; width: 90%; min-height: auto; border-radius: 24px; }
            .modal-layout { flex-direction: row !important; }
            .episodes-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    </body>
</html>
